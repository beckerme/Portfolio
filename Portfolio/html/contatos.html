<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/sectiom_about.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="../css/section_projects.css">
    <link rel="stylesheet" href="../css/contatos.css">
    <title>Contatos</title>
</head>
<body>
    <header>
        <div>
            <h1>EW_MAC</h1>
        </div>
        <nav>
            <a href="index.html" lang="en">Home</a>
            <a href="#">Sobre</a>
            <a href="#" lang="en">Contact me!</a>
        </nav>
    </header>
    
    <div class="container">
        <form>
          <ul class="flex-outer">
            <li>
              <label for="first-name">Nome</label>
              <input type="text" id="first-name" placeholder="Digite o seu nome aqui">
            </li>
            <li>
              <label for="last-name">Sobrenome</label>
              <input type="text" id="last-name" placeholder="Digite o seu sobrenome aqui">
            </li>
            <li>
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="Digite o seu email">
            </li>
            <li>
              <label for="phone">Nº telefone</label>
              <input type="tel" id="phone" placeholder="Digite o seu numero de telefone">
            </li>
            <li>
              <label for="message">Mensagem</label>
              <textarea rows="6" id="message" placeholder="Digite a sua mensagem aqui"></textarea>
            </li>
            <li>
              <button type="submit">Submit</button>
            </li>
          </ul>
        </form>
      </div>

      <footer class="footer">
        <h3>Desenvolvido por: <em> &copy; Ewerton Becker</em></h3>
    </footer>
</body>
</html>
